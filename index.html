<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego de Esquivar</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .contenedor {
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    #juego {
      width: 400px;
      height: 500px;
      background: #1f2937;
      border: 3px solid #38bdf8;
      position: relative;
      overflow: hidden;
      margin: auto;
    }

    #jugador {
      width: 50px;
      height: 50px;
      background: #22c55e;
      position: absolute;
      bottom: 10px;
      left: 175px;
      border-radius: 10px;
    }

    .obstaculo {
      width: 50px;
      height: 50px;
      background: #ef4444;
      position: absolute;
      top: -60px;
      border-radius: 50%;
    }

    #puntos {
      margin: 10px;
      font-size: 20px;
    }

    #mensaje {
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      color: #111827;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>Juego de Esquivar</h1>
    <div id="puntos">Puntos: 0</div>

    <div id="juego">
      <div id="jugador"></div>
    </div>

    <div id="mensaje">Usa ← y → para moverte</div>
    <button onclick="reiniciarJuego()">Reiniciar</button>
  </div>

  <script>
    const juego = document.getElementById("juego");
    const jugador = document.getElementById("jugador");
    const puntosTexto = document.getElementById("puntos");
    const mensaje = document.getElementById("mensaje");

    let posicionJugador = 175;
    let puntos = 0;
    let velocidad = 4;
    let juegoActivo = true;
    let intervaloObstaculos;
    let intervaloPuntos;

    document.addEventListener("keydown", function(e) {
      if (!juegoActivo) return;

      if (e.key === "ArrowLeft" && posicionJugador > 0) {
        posicionJugador -= 25;
      }

      if (e.key === "ArrowRight" && posicionJugador < 350) {
        posicionJugador += 25;
      }

      jugador.style.left = posicionJugador + "px";
    });

    function crearObstaculo() {
      if (!juegoActivo) return;

      const obstaculo = document.createElement("div");
      obstaculo.classList.add("obstaculo");

      let posicionX = Math.floor(Math.random() * 8) * 50;
      obstaculo.style.left = posicionX + "px";

      juego.appendChild(obstaculo);

      let posicionY = -60;

      const mover = setInterval(() => {
        if (!juegoActivo) {
          clearInterval(mover);
          return;
        }

        posicionY += velocidad;
        obstaculo.style.top = posicionY + "px";

        const jugadorRect = jugador.getBoundingClientRect();
        const obstaculoRect = obstaculo.getBoundingClientRect();

        if (
          jugadorRect.left < obstaculoRect.right &&
          jugadorRect.right > obstaculoRect.left &&
          jugadorRect.top < obstaculoRect.bottom &&
          jugadorRect.bottom > obstaculoRect.top
        ) {
          terminarJuego();
          clearInterval(mover);
        }

        if (posicionY > 500) {
          obstaculo.remove();
          clearInterval(mover);
        }
      }, 20);
    }

    function iniciarJuego() {
      intervaloObstaculos = setInterval(crearObstaculo, 900);

      intervaloPuntos = setInterval(() => {
        if (juegoActivo) {
          puntos++;
          puntosTexto.textContent = "Puntos: " + puntos;

          if (puntos % 10 === 0) {
            velocidad += 0.5;
          }
        }
      }, 500);
    }

    function terminarJuego() {
      juegoActivo = false;
      mensaje.textContent = "Perdiste. Puntuación final: " + puntos;
      clearInterval(intervaloObstaculos);
      clearInterval(intervaloPuntos);
    }

    function reiniciarJuego() {
      document.querySelectorAll(".obstaculo").forEach(o => o.remove());

      posicionJugador = 175;
      puntos = 0;
      velocidad = 4;
      juegoActivo = true;

      jugador.style.left = posicionJugador + "px";
      puntosTexto.textContent = "Puntos: 0";
      mensaje.textContent = "Usa ← y → para moverte";

      clearInterval(intervaloObstaculos);
      clearInterval(intervaloPuntos);

      iniciarJuego();
    }

    iniciarJuego();
  </script>

</body>
</html>
